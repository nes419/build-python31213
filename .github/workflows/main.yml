name: Build Python for Windows

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python版本号'
        required: true
        default: '3.12.13'
      python_short_version:
        description: '短版本号'
        required: true
        default: '312'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Download Source
      run: |
        curl -O https://www.python.org/ftp/python/${{ github.event.inputs.python_version }}/Python-${{ github.event.inputs.python_version }}.tgz
        tar -xzf Python-${{ github.event.inputs.python_version }}.tgz

    - name: Get Externals
      run: |
        cd Python-${{ github.event.inputs.python_version }}/PCbuild
        ./get_externals.bat

    - name: Build
      run: |
        cd Python-${{ github.event.inputs.python_version }}/PCbuild
        ./build.bat -c Release -p x64

    - name: Collect Files
      run: |
        mkdir Python-${{ github.event.inputs.python_version }}-Full
        mkdir Python-${{ github.event.inputs.python_version }}-Full\DLLs
        copy Python-${{ github.event.inputs.python_version }}\PCbuild\amd64\*.exe Python-${{ github.event.inputs.python_version }}-Full\
        copy Python-${{ github.event.inputs.python_version }}\PCbuild\amd64\*.dll Python-${{ github.event.inputs.python_version }}-Full\
        copy Python-${{ github.event.inputs.python_version }}\PCbuild\amd64\*.pyd Python-${{ github.event.inputs.python_version }}-Full\DLLs\
        copy Python-${{ github.event.inputs.python_version }}\PCbuild\amd64\LICENSE.txt Python-${{ github.event.inputs.python_version }}-Full\
        xcopy Python-${{ github.event.inputs.python_version }}\Lib Python-${{ github.event.inputs.python_version }}-Full\Lib\ /E /I /Q
        xcopy Python-${{ github.event.inputs.python_version }}\PCbuild\amd64\tcl86t.dll Python-${{ github.event.inputs.python_version }}-Full\ /Y
        xcopy Python-${{ github.event.inputs.python_version }}\PCbuild\amd64\tk86t.dll Python-${{ github.event.inputs.python_version }}-Full\ /Y

    - name: Create _pth File
      run: |
        echo .> Python-${{ github.event.inputs.python_version }}-Full\python${{ github.event.inputs.python_short_version }}._pth
        echo DLLs>> Python-${{ github.event.inputs.python_version }}-Full\python${{ github.event.inputs.python_short_version }}._pth
        echo Lib>> Python-${{ github.event.inputs.python_version }}-Full\python${{ github.event.inputs.python_short_version }}._pth
        echo Lib\site-packages>> Python-${{ github.event.inputs.python_version }}-Full\python${{ github.event.inputs.python_short_version }}._pth
        echo import site>> Python-${{ github.event.inputs.python_version }}-Full\python${{ github.event.inputs.python_short_version }}._pth

    - name: Install Pip
      run: |
        Python-${{ github.event.inputs.python_version }}-Full\python.exe -m ensurepip
        Python-${{ github.event.inputs.python_version }}-Full\python.exe -m pip install --upgrade pip
        Python-${{ github.event.inputs.python_version }}-Full\python.exe -m pip install --force-reinstall pip

    - name: Verify
      run: |
        Python-${{ github.event.inputs.python_version }}-Full\python.exe --version
        Python-${{ github.event.inputs.python_version }}-Full\python.exe -c "import ssl, sqlite3, socket; print('OK')"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Python-${{ github.event.inputs.python_version }}-Full
        path: Python-${{ github.event.inputs.python_version }}-Full/
        retention-days: 30
